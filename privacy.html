<style>
:root {
  --blue: #185FA5; --blue-dark: #0C447C; --blue-light: #E6F1FB;

  --bg: #F4F6FA; --surface: #fff; --border: #DEE3EC;
  --text: #1a1a2e; --muted: #6B7280;
  --r: 12px; --rs: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

/* 헤더 */
.hdr { background: var(--blue-dark); color: #fff; padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; }
.hdr-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.hdr-logo { font-size: 24px; }
.hdr-title { font-size: 16px; font-weight: 700; }
.hdr-sub { font-size: 11px; opacity: 0.7; margin-top: 1px; }

/* 언어 선택 */
.lang-bar { background: var(--blue); padding: 10px 20px; }
.lang-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 6px; flex-wrap: wrap; }
.lang-btn { padding: 4px 12px; font-size: 12px; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 999px; background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; font-weight: 500; transition: all 0.15s; }
.lang-btn.active { background: rgba(255,255,255,0.2); border-color: #fff; color: #fff; font-weight: 700; }

/* 컨텐츠 */
.container { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
.hero { background: var(--surface); border-radius: var(--r); padding: 28px 24px; margin-bottom: 20px; box-shadow: var(--shadow); border-left: 5px solid var(--blue); }
.hero h1 { font-size: 22px; font-weight: 800; color: var(--blue-dark); margin-bottom: 6px; }
.hero p { font-size: 13px; color: var(--muted); }

.section { background: var(--surface); border-radius: var(--r); padding: 22px 24px; margin-bottom: 12px; box-shadow: var(--shadow); }
.section h2 { font-size: 15px; font-weight: 700; color: var(--blue-dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.section p { font-size: 14px; color: var(--text); margin-bottom: 8px; }
.section ul { padding-left: 18px; }
.section ul li { font-size: 14px; color: var(--text); margin-bottom: 5px; }
.highlight { background: var(--blue-light); border-radius: var(--rs); padding: 12px 16px; margin-top: 10px; font-size: 13px; color: var(--blue-dark); font-weight: 600; }
.green-box { background: var(--green-light); border-radius: var(--rs); padding: 12px 16px; margin-top: 10px; font-size: 13px; color: #0F6E56; font-weight: 600; }
.footer { text-align: center; padding: 20px; font-size: 12px; color: var(--muted); }
.footer a { color: var(--blue); text-decoration: none; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; padding: 8px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; text-decoration: none; }
.back-btn:hover { border-color: var(--blue); color: var(--blue); }

function setLang(lang) {

  document.querySelectorAll('.lang-btn').forEach(b => {

      b.classList.add('active');
    }
  });
  const t = TEXTS[lang] || TEXTS.en;
  document.getElementById('hdr-sub').textContent = t.hdrSub;
  document.getElementById('back-label').textContent = t.back;
  document.getElementById('privacy-content').innerHTML = t.content;
  document.documentElement.lang = lang;
}

// 브라우저 언어 자동 감지
function detectLang() {
  const bl = (navigator.language || 'en').substring(0, 2);
  const supported = ['ko','en','de','es','ja','zh'];
  return supported.includes(bl) ? bl : 'en';
}
